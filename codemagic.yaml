workflows:
  ios-testflight:
    name: FlappyButtdog - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreConnectKey   # name this connection in Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.99cshea.flappybuttdog
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "FlappyButtdog.xcodeproj" \
            --scheme "FlappyButtdog" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
